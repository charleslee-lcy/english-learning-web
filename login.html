<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - English Learning</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }

        .login-container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 400px; animation: fadeInUp 0.6s ease; }

        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header .logo { font-size: 28px; font-weight: bold; color: #e74c3c; margin-bottom: 10px; }
        .login-header .logo span { color: #333; }
        .login-header p { color: #888; font-size: 14px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #555; font-size: 14px; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; transition: all 0.3s ease; outline: none; }
        .form-group input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }

        .login-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.3s ease; }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }
        .login-btn:active { transform: translateY(0); }

        .form-footer { text-align: center; margin-top: 20px; }
        .form-footer a { color: #667eea; text-decoration: none; font-size: 14px; transition: color 0.3s ease; }
        .form-footer a:hover { color: #764ba2; }

        .back-link { text-align: center; margin-top: 25px; }
        .back-link a { color: #888; text-decoration: none; font-size: 13px; transition: color 0.3s ease; }
        .back-link a:hover { color: #667eea; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .login-container { margin: 20px; padding: 30px 25px; }
            .login-header .logo { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">Learn<span>English</span></div>
            <p>欢迎回来，请登录您的账户</p>
        </div>
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">用户名 / 邮箱</label>
                <input type="text" id="username" placeholder="请输入用户名或邮箱" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="login-btn">登 录</button>
        </form>
        <div class="form-footer">
            <a href="#">忘记密码？</a>
        </div>
        <div class="back-link">
            <a href="index.html">← 返回首页</a>
        </div>
    </div>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (username && password) {
                alert('登录成功！欢迎 ' + username);
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
